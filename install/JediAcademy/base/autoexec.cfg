// Most of these settings only work if you are hosting a Jedi Academy server - tweak them to your liking, but I have picked the best ones
// Server Rate
seta sv_fps 360

// Server (Host) Force Regen Time (1 point per 100ms)
seta g_forceRegenTime 100

// Enable high-precision floating point movement (Stops the velocity vibration)
seta pmove_float 1

// Disable the prediction correction vibration
seta cg_errorDecay 0

// Client Rate
seta cl_maxpackets 360
seta snaps 360
seta com_maxfps 360

// Client Camera
seta cg_smoothCamera 1

